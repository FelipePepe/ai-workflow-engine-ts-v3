name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Placeholder Security Gate
        run: echo "Run OWASP/SAST/SCA tools here"
      - name: Placeholder Quality Gate
        run: echo "Run SonarQube scanner here"
